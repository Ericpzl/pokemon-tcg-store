<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSobres - Mi Álbum</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .album-filters {
            display: flex;
            gap: 1rem;
            margin: 2rem;
            padding: 1rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            flex-wrap: wrap;
            align-items: center;
        }
        .album-filters input, .album-filters select {
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: var(--bg-color);
            color: var(--text-color);
        }
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            padding: 2rem;
        }
        .album-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .album-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            border-color: var(--primary-color);
        }
        .card-img-container {
            width: 100%;
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .card-img-container img {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }
        .badge-qty {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .heart-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 1.5rem;
            color: var(--text-muted);
            transition: color 0.3s, transform 0.2s;
        }
        .heart-icon.active {
            color: #ff4757;
            text-shadow: 0 0 10px rgba(255, 71, 87, 0.5);
        }
        .sell-checkbox {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 1.2rem;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-color);
            border: 2px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }
        .sell-checkbox:hover { border-color: #f0a500; }
        .sell-checkbox.checked {
            background: #f0a500;
            border-color: #f0a500;
            color: white;
            font-weight: bold;
        }
        .card-selected {
            border-color: #f0a500 !important;
            box-shadow: 0 0 15px rgba(240, 165, 0, 0.4) !important;
        }
        /* Floating sell bar */
        .sell-bar {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border: 1px solid #f0a500;
            border-radius: 16px;
            padding: 1rem 2rem;
            display: none;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 8px 30px rgba(240, 165, 0, 0.3);
            z-index: 3000;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100px); opacity: 0; }
            to   { transform: translateX(-50%) translateY(0);    opacity: 1; }
        }
        .sell-bar-info { color: white; font-weight: bold; }
        .sell-bar-info span { color: #f0a500; }
        .btn-sell-confirm {
            background: linear-gradient(135deg, #f0a500, #e67e22);
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-sell-confirm:hover { opacity: 0.85; }
        .btn-sell-cancel {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid var(--glass-border);
            padding: 0.7rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        /* Toast */
        .sell-toast {
            position: fixed;
            top: 5rem;
            right: 2rem;
            background: #2ecc71;
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(46,204,113,0.4);
            z-index: 9999;
            animation: fadeInOut 3s ease forwards;
        }
        @keyframes fadeInOut {
            0%   { opacity: 0; transform: translateY(-20px); }
            15%  { opacity: 1; transform: translateY(0); }
            80%  { opacity: 1; }
            100% { opacity: 0; }
        }
        .btn-sell-modal {
            flex: 1;
            background: linear-gradient(135deg, #f0a500, #e67e22);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: opacity 0.2s;
        }
        .btn-sell-modal:hover { opacity: 0.85; }

        /* Modal Styles */
        .card-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .card-modal {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 3rem;
            display: flex;
            gap: 3rem;
            max-width: 800px;
            width: 90%;
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: modalPopIn 0.3s ease-out;
        }
        @keyframes modalPopIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
        }
        .close-modal:hover { color: white; }
        .modal-img {
            width: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .modal-details h2 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 1rem 0;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.5rem;
        }
        .btn-favorite {
            margin-top: 2rem;
            background: transparent;
            border: 2px solid #ff4757;
            color: #ff4757;
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        .btn-favorite:hover {
            background: rgba(255, 71, 87, 0.1);
        }
        .btn-favorite.active {
            background: #ff4757;
            color: white;
            box-shadow: 0 0 20px rgba(255, 71, 87, 0.4);
        }

        /* Holo Effect Styles */
        .holo-card-container {
            perspective: 1000px;
            width: 300px;
            height: 420px;
        }
        .holo-card {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .holo-card img {
            width: 100%;
            height: 100%;
            border-radius: 15px;
            object-fit: cover;
        }
        .holo-glare {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 15px;
            background: linear-gradient(
                105deg,
                transparent 20%,
                rgba(255, 215, 0, 0.4) 25%,
                rgba(255, 0, 128, 0.4) 30%,
                rgba(0, 255, 255, 0.4) 35%,
                transparent 40%
            );
            background-size: 300% 300%;
            mix-blend-mode: color-dodge;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 2;
        }
    </style>
</head>
<body>
    <header style="padding: 1.5rem 2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <h2>PokéSobres</h2>
        <nav style="display: flex; gap: 1.5rem;">
            <a href="index.html">Tienda</a>
            <a href="cart.html" id="nav-cart-link">Carrito (0)</a>
            <a href="inventario.html">Inventario</a>
            <a href="album.html" style="color: var(--primary-color); font-weight: bold;">Álbum</a>
            <a href="perfil.html">Perfil</a>
            <span id="nav-user-balance" style="font-weight: bold; color: var(--success-color); border-left: 1px solid var(--glass-border); padding-left: 1.5rem; display: flex; align-items: center;"></span>
            <a href="add_funds.html" style="font-size: 1.8rem; text-decoration: none; transition: transform 0.2s; display: inline-block; margin-left: 0.5rem; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); cursor: pointer;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Añadir Monedas">💎</a>
            <button onclick="toggleTheme()" class="theme-toggle-btn" style="background: none; border: none; cursor: pointer; font-size: 1.5rem; margin-left: 0.5rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'" title="Cambiar Tema">🌞</button>
        </nav>
    </header>

    <main>
        <div class="album-filters">
            <input type="text" id="filter-name" placeholder="Buscar por nombre..." style="flex: 1;">
            <select id="filter-type">
                <option value="">Cualquier Tipo</option>
                <option value="Fuego">Fuego</option>
                <option value="Agua">Agua</option>
                <option value="Planta">Planta</option>
                <option value="Eléctrico">Eléctrico</option>
                <option value="Psíquico">Psíquico</option>
                <option value="Fantasma">Fantasma</option>
            </select>
            <select id="filter-rarity">
                <option value="">Cualquier Rareza</option>
                <option value="Común">Común</option>
                <option value="Poco Común">Poco Común</option>
                <option value="Rara">Rara</option>
                <option value="Rara Secreta">Rara Secreta</option>
            </select>
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                <input type="checkbox" id="filter-favorites">
                Solo Favoritas ❤️
            </label>
        </div>

        <div id="album-container" class="album-grid">
            <p style="color: var(--text-muted); margin-left: 2rem;">Cargando tu colección...</p>
        </div>
    </main>

    <!-- Floating Sell Bar -->
    <div class="sell-bar" id="sell-bar">
        <div class="sell-bar-info">
            🏷️ <span id="sell-bar-count">0</span> carta(s) seleccionada(s) · Total: <span id="sell-bar-total">0</span>🪙
        </div>
        <button class="btn-sell-confirm" onclick="confirmSell()">💰 Vender Selección</button>
        <button class="btn-sell-cancel" onclick="cancelSell()">✕ Cancelar</button>
    </div>

    <!-- Modal Detalles Carta -->
    <div class="card-modal-overlay" id="card-modal" onclick="if(event.target === this) closeCardModal()">
        <div class="card-modal">
            <span class="close-modal" onclick="closeCardModal()">&times;</span>
            <div class="holo-card-container">
                <div id="modal-holo-card" class="holo-card">
                    <img id="modal-img" src="" alt="Carta">
                    <div id="modal-holo-glare" class="holo-glare"></div>
                </div>
            </div>
            <div class="modal-details" style="flex: 1;">
                <h2 id="modal-name">Nombre de Carta</h2>
                <span id="modal-rarity" style="color: var(--primary-color); font-weight: bold; margin-bottom: 2rem; display: block;">Rareza</span>
                
                <div class="stat-row">
                    <span style="color: var(--text-muted);">Tipo</span>
                    <span id="modal-type" style="font-weight: bold;">Tipo</span>
                </div>
                <div class="stat-row">
                    <span style="color: var(--text-muted);">HP</span>
                    <span id="modal-hp" style="font-weight: bold;">0</span>
                </div>
                <div class="stat-row">
                    <span style="color: var(--text-muted);">Copias Poseídas</span>
                    <span id="modal-qty" style="font-weight: bold;">x0</span>
                </div>
                <div class="stat-row">
                    <span style="color: var(--text-muted);">Fecha de Obtención</span>
                    <span id="modal-date" style="font-weight: bold;">-</span>
                </div>
                <div class="stat-row">
                    <span style="color: var(--text-muted);">Valor de Mercado</span>
                    <span id="modal-price" style="font-weight: bold; color: var(--warning-color);">0 🪙</span>
                </div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button id="modal-fav-btn" class="btn-favorite" style="flex: 1; margin-top: 0;" onclick="toggleFavoriteFromModal()">
                        ❤️ Añadir a Favoritos
                    </button>
                    <button id="modal-sell-btn" class="btn-sell-modal" onclick="sellFromModal()">
                        Vender
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de Confirmación Personalizado -->
    <div class="card-modal-overlay" id="custom-confirm-modal" style="z-index: 3000; display: none;">
        <div class="card-modal" style="max-width: 400px; padding: 2.5rem; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 1.5rem;">
            <div style="font-size: 3rem; background: rgba(240, 165, 0, 0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #f0a500; box-shadow: 0 0 20px rgba(240,165,0,0.4);">💰</div>
            <h2 style="font-size: 1.8rem; margin: 0;">Confirmar Venta</h2>
            <p id="custom-confirm-text" style="color: var(--text-muted); font-size: 1.1rem; margin: 0; line-height: 1.5;"></p>
            <div style="display: flex; gap: 1rem; width: 100%; margin-top: 1rem;">
                <button class="btn-sell-cancel" style="flex: 1; padding: 1rem;" onclick="closeCustomConfirm()">Cancelar</button>
                <button class="btn-sell-confirm" style="flex: 1; padding: 1rem;" id="custom-confirm-yes">Confirmar Venta</button>
            </div>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/app.js"></script>
    <script src="../js/album.js"></script>
</body>
</html>
