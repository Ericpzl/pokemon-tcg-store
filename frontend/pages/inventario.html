<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSobres - Mi Inventario</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .inventory-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .pack-item {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            transition: transform 0.2s;
        }
        .pack-item:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }
        .pack-image {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .pack-image img {
            max-height: 100%;
            border-radius: 4px;
        }
        .pack-quantity {
            position: absolute;
            top: -10px;
            right: -10px;
            background: var(--error-color);
            color: white;
            font-weight: bold;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Modal & Animations */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        @keyframes flash {
            0% { background-color: transparent; }
            50% { background-color: white; }
            100% { background-color: transparent; }
        }
        .shaking {
            animation: shake 0.5s;
            animation-iteration-count: infinite;
        }
        .flashing {
            animation: flash 0.5s ease-out;
        }
        .revealed-card {
            width: 200px;
            height: 280px;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 2px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .roulette-card {
            width: 200px;
            height: 280px;
            background: var(--bg-secondary);
            border-radius: 10px;
            border: 2px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            flex-shrink: 0;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .roulette-card.winner {
            border-color: var(--success-color);
            box-shadow: 0 0 30px var(--success-color);
            transform: scale(1.05);
            transition: all 0.5s;
        }
    </style>
</head>
<body>
    <header style="padding: 1.5rem 2rem; background: var(--bg-secondary); border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;">
        <h2>PokéSobres <span style="font-size: 1rem; color: var(--text-muted);">| Mi Inventario</span></h2>
        <nav style="display: flex; gap: 1.5rem;">
            <a href="index.html">Tienda</a>
            <a href="cart.html" id="nav-cart-link">Carrito</a>
            <a href="inventario.html" style="color: var(--primary-color); font-weight: bold;">Inventario</a>
            <a href="album.html">Álbum</a>
            <a href="#">Perfil</a>
            <span id="nav-user-balance" style="font-weight: bold; color: var(--success-color); border-left: 1px solid var(--glass-border); padding-left: 1.5rem; display: flex; align-items: center;"></span>
            <a href="add_funds.html" style="background: var(--primary-color); padding: 0.2rem 0.6rem; border-radius: 4px; font-weight: bold; color: white; text-decoration: none; margin-left: 0.5rem; display: flex; align-items: center; justify-content: center; height: 1.5rem;" title="Añadir Saldo">+</a>
        </nav>
    </header>
    
    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3>Tus Sobres</h3>
                <p style="color: var(--text-muted);">Selecciona un sobre para abrirlo y descubrir nuevas cartas.</p>
            </div>
        </div>

        <div id="inventory-container" class="inventory-grid">
            <p style="color: var(--text-muted);">Cargando tu inventario...</p>
        </div>
    </main>

    <!-- Pack Opening Modal -->
    <div class="modal-overlay" id="opening-modal" style="display: none; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; overflow: hidden;">
        <h2 id="opening-title" style="color: white; margin-bottom: 2rem; font-size: 2rem; text-shadow: 0 0 10px var(--primary-color); z-index: 2;">Abriendo Sobre...</h2>
        
        <div id="roulette-container" style="position: relative; width: 100%; height: 320px; overflow: hidden; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); box-shadow: inset 0 0 50px rgba(0,0,0,1);">
            
            <!-- Target line in the center -->
            <div style="position: absolute; width: 4px; height: 100%; background: var(--error-color); z-index: 10; left: 50%; transform: translateX(-50%); box-shadow: 0 0 15px var(--error-color);"></div>

            <!-- The spinning track -->
            <div id="roulette-track" style="display: flex; gap: 1rem; position: absolute; left: 50%; transform: translateX(0); height: 280px; align-items: center;">
                <!-- Cards injected via JS -->
            </div>
            
        </div>

        <div id="opening-actions" style="display: none; margin-top: 3rem; z-index: 2;">
            <button class="btn" style="background: var(--bg-secondary); margin-right: 1rem;" onclick="closeOpeningModal()">Volver al Inventario</button>
            <button class="btn" onclick="window.location.href='album.html'">Ir al Álbum</button>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/inventario.js"></script>
</body>
</html>
