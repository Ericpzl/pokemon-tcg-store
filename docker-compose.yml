version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "7070:7070"
    environment:
      # Usamos host.docker.internal para que Docker pueda ver el MySQL de tu ordenador
      - DB_HOST=host.docker.internal
    # Esto es necesario para Windows/Mac para resolver host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
